# 360智能摄像机配置文件
# 请复制此文件为 config.yaml 并填入实际数据

# Cookie 配置
cookie: |
  xxxxxxxxxxxxxxxx

# 摄像机列表
cameras:
  - enabled: true
    name: "摄像机1"
    sn: "xxxxxxxx"
    # API 版本: v1 或 v2，默认 v2
    api_version: "v2"

  - name: "摄像机2"
    sn: "xxxxxxxx"
    enabled: true
    api_version: "v1"

# 请求配置
# 每个摄像机请求之间的间隔（秒）
request_interval: 3

# 后端服务配置
server:
  # 播放信息缓存秒数，避免前端获取到的密钥和代理流地址错位
  play_info_cache_seconds: 30
  # 部署在反向代理后面时，显式指定前端可访问的后端公网地址
  # 例如: "https://you.domain.com"
  public_base_url: ""
